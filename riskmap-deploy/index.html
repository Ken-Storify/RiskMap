<div id="login-gate">

    <div class="login-logo">RiskMap</div>
    <div class="login-sub">Senior Housing Edition &middot; AJ Gallagher</div>
    <input class="login-input" type="password" id="pwd-input" placeholder="Enter password" />
    <button class="login-btn" onclick="checkPassword()">Enter</button>
    <div class="login-err" id="pwd-err" style="display:none">Incorrect password</div>
    <div class="login-credit">Ken Leatherman &middot; Senior Advisor</div>
  </div>
</div>

<div id="app-root">
  <div id="app"></div>
</div>

<script>
const APP_PASSWORD = "RiskMap2025";

function checkPassword() {
  const pwd = document.getElementById("pwd-input").value;
  const err = document.getElementById("pwd-err");
  if (pwd === APP_PASSWORD) {
    sessionStorage.setItem("rm_auth", "1");
    document.getElementById("login-gate").style.display = "none";
    document.getElementById("app-root").style.display = "block";
  } else {
    err.style.display = "block";
    setTimeout(() => { err.style.display = "none"; }, 2000);
  }
}

document.getElementById("pwd-input").addEventListener("keydown", e => {
  if (e.key === "Enter") checkPassword();
});

if (sessionStorage.getItem("rm_auth") === "1") {
  document.getElementById("login-gate").style.display = "none";
  document.getElementById("app-root").style.display = "block";
}

// Storage adapter — uses localStorage instead of window.storage
const storage = {
  get: async (key) => {
    try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch(e) { return null; }
  },
  set: async (key, value) => {
    try { localStorage.setItem(key, value); return { key, value }; } catch(e) { return null; }
  }
};
</script>

function App(){
const [view,setView]=useState("dashboard");
const [engagements,setEngagements]=useState([]);
const [loading,setLoading]=useState(true);
const [saving,setSaving]=useState(false);
const [form,setForm]=useState(initForm());
const [errors,setErrors]=useState({});
const [openEngId,setOpenEngId]=useState(null);
const [profiles,setProfiles]=useState({});
const [docSets,setDocSets]=useState({});
const [pmSets,setPMSets]=useState({});
const [iqSets,setIQSets]=useState({});
const [obSets,setObSets]=useState({});
const [scoreSets,setScoreSets]=useState({});
const [synthSets,setSynthSets]=useState({});
const [reportSets,setReportSets]=useState({});
useEffect(()=>{(async()=>{
const load=async(key,def)=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):def}catch(e){return def}};
const [engs,profs,docs,pms,iqs,obs,scores,synths,reps]=await Promise.all([load(EKEY,[]),load(PKEY,{}),load(DKEY,{}),load(PMKEY,{}),load(IQKEY,{}),load(OBKEY,{}),load(SCKEY,{}),load(SYKEY,{}),load(RPKEY,{})]);
setEngagements(engs);setProfiles(profs);setDocSets(docs);setPMSets(pms);setIQSets(iqs);setObSets(obs);setScoreSets(scores);setSynthSets(synths);setReportSets(reps);
setLoading(false);})();},[]);
async function persist(key,data){try{localStorage.setItem(key,JSON.stringify(data))}catch(e){}}
function validate(){const er={};if(!form.clientName.trim())er.clientName="Required";if(!form.facilityType)er.facilityType="Required";if(!form.primaryContactName.trim())er.primaryContactName="Required";if(!form.siteVisitDate)er.siteVisitDate="Required";return er}
async function handleCreate(){
const er=validate();if(Object.keys(er).length){setErrors(er);return}
setSaving(true);
const eng={id:Date.now().toString(),...form,status:"In Progress",createdAt:new Date().toISOString()};
const updEngs=[eng,...engagements];setEngagements(updEngs);await persist(EKEY,updEngs);
const np={...profiles,[eng.id]:initProfile()};setProfiles(np);await persist(PKEY,np);
const nd={...docSets,[eng.id]:initDocs()};setDocSets(nd);await persist(DKEY,nd);
const npm={...pmSets,[eng.id]:initPM()};setPMSets(npm);await persist(PMKEY,npm);
const niq={...iqSets,[eng.id]:initIQ()};setIQSets(niq);await persist(IQKEY,niq);
const nob={...obSets,[eng.id]:initObs()};setObSets(nob);await persist(OBKEY,nob);
const nsc={...scoreSets,[eng.id]:initScores()};setScoreSets(nsc);await persist(SCKEY,nsc);
const nsy={...synthSets,[eng.id]:initSynth()};setSynthSets(nsy);await persist(SYKEY,nsy);
const nrp={...reportSets,[eng.id]:initReport()};setReportSets(nrp);await persist(RPKEY,nrp);
setSaving(false);setForm(initForm());setErrors({});setOpenEngId(eng.id);setView("profile");}
function onNav(id){if(id==="dashboard")setOpenEngId(null);if(id==="new"){setForm(initForm());setErrors({})}setView(id)}
function makeSet(setter,key){return(eid)=>(updater)=>{setter(prev=>{const cur=prev[eid];const next={...prev,[eid]:typeof updater==="function"?updater(cur):updater};persist(key,next);return next})}}
async function saveFor(key,state){setSaving(true);await persist(key,state);setSaving(false)}
const eid=openEngId||"";
const openEng=engagements.find(x=>x.id===eid);
const profile=profiles[eid]||initProfile();
const docs=docSets[eid]||initDocs();
const pm=pmSets[eid]||initPM();
const iq=iqSets[eid]||initIQ();
const ob=obSets[eid]||initObs();
const sc=scoreSets[eid]||initScores();
const synth=synthSets[eid]||initSynth();
const report=reportSets[eid]||initReport();
const setProfileFor=makeSet(setProfiles,PKEY)(eid);
const setDocsFor=makeSet(setDocSets,DKEY)(eid);
const setPMFor=makeSet(setPMSets,PMKEY)(eid);
const setIQFor=makeSet(setIQSets,IQKEY)(eid);
const setObFor=makeSet(setObSets,OBKEY)(eid);
const setScFor=makeSet(setScoreSets,SCKEY)(eid);
const setSynthFor=makeSet(setSynthSets,SYKEY)(eid);
const setReportFor=makeSet(setReportSets,RPKEY)(eid);
return h("div",{className:"rm-app"},
h(Sidebar,{view,openEngId,onNav}),
h("div",{className:"rm-main"},
view==="dashboard"&&h(Dashboard,{engagements,loading,onNew:()=>onNav("new"),onOpen:id=>{setOpenEngId(id);setView("profile")}}),
view==="new"&&h(NewEngagement,{form,setForm,errors,saving,onSubmit:handleCreate,onCancel:()=>setView("dashboard")}),
openEng&&view==="profile"&&h(ClientProfile,{eng:openEng,profile,setProfile:setProfileFor,onSave:()=>saveFor(PKEY,profiles),saving}),
openEng&&view==="docs"&&h(DocTracker,{eng:openEng,docs,setDocs:setDocsFor,onSave:()=>saveFor(DKEY,docSets),saving}),
openEng&&view==="premeet"&&h(PreMeeting,{eng:openEng,pm,setPM:setPMFor,onSave:()=>saveFor(PMKEY,pmSets),saving}),
openEng&&view==="interview"&&h(InterviewWorkspace,{eng:openEng,iq,setIQ:setIQFor,onSave:()=>saveFor(IQKEY,iqSets),saving}),
openEng&&view==="obs"&&h(SiteObservation,{eng:openEng,obs:ob,setObs:setObFor,onSave:()=>saveFor(OBKEY,obSets),saving}),
openEng&&view==="scores"&&h(DomainScorecards,{eng:openEng,scores:sc,setScores:setScFor,iq,obs:ob,onSave:()=>saveFor(SCKEY,scoreSets),saving}),
openEng&&view==="synth"&&h(Synthesis,{eng:openEng,synth,setSynth:setSynthFor,scores:sc,onSave:()=>saveFor(SYKEY,synthSets),saving}),
openEng&&view==="report"&&h(ReportBuilder,{eng:openEng,scores:sc,synth,report,setReport:setReportFor,onSave:()=>saveFor(RPKEY,reportSets),saving})
))}
ReactDOM.createRoot(document.getElementById("app")).render(h(App));
</script>
